client_id = "fd0433ab7858494e1277862d9aeadf8a"
name = "Echoment-shop-app"
application_url = "https://echoment-shop-app.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  uri = "https://order.api.vanbal.net/shopify/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "https://order.api.vanbal.net/shopify/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

